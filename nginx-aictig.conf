# Nginx configuration for aictig.org
# Place this in /etc/nginx/sites-available/aictig.org
# Then symlink to sites-enabled: ln -s /etc/nginx/sites-available/aictig.org /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name aictig.org www.aictig.org;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aictig.org www.aictig.org;

    # SSL Certificate paths (update after installing Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/aictig.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aictig.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Logs
    access_log /home/aictig/logs/access.log;
    error_log /home/aictig/logs/error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Proxy to Node.js app on port 3001
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
}
